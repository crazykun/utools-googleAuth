<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Google Authenticator</title>
    <link href="layui/css/layui.css" rel="stylesheet">
    <link href="css/index.css" rel="stylesheet">
</head>

<body>

    <div class="main-container">
        <!-- 内容主体区域 -->
        <div class="content-area" id="view">
            <!-- 自动渲染数据 -->
        </div>
        <!-- 内容主体区域 -->

        <!-- 底部操作按钮 -->
        <div class="action-buttons">
            <button class="action-btn add-btn" data-tooltip="添加密钥 (A)">
                <i class="layui-icon">&#xe654;</i>
            </button>
            <button class="action-btn qrcode-btn" data-tooltip="识别二维码 (Q)">
                <i class="layui-icon">&#xe615;</i>
            </button>
            <button class="action-btn backup-btn" data-tooltip="备份管理">
                <i class="layui-icon">&#xe658;</i>
            </button>
            <button class="action-btn help-btn" data-tooltip="帮助 (?)">
                <i class="layui-icon">&#xe607;</i>
            </button>
            <button class="action-btn set-btn" data-tooltip="设置 (S)">
                <i class="layui-icon">&#xe614;</i>
            </button>
        </div>
    </div>

    <!-- 快捷键帮助面板 -->
    <div class="shortcuts-panel" id="shortcutsPanel" style="display: none;">
        <h4>⌨️ 快捷键</h4>
        <div class="shortcut-item"><span>复制第N个</span><kbd>Alt</kbd> + <kbd>1-9</kbd></div>
        <div class="shortcut-item"><span>添加密钥</span><kbd>A</kbd></div>
        <div class="shortcut-item"><span>识别二维码</span><kbd>Q</kbd></div>
        <div class="shortcut-item"><span>设置</span><kbd>S</kbd></div>
        <div class="shortcut-item"><span>关闭弹窗</span><kbd>Esc</kbd></div>
        <div class="shortcut-item"><span>显示/隐藏帮助</span><kbd>?</kbd></div>
        <div style="margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.2); color: #aaa; font-size: 11px; line-height: 1.6;">
            💡 拖动卡片可调整排序<br>
            点击任意处关闭
        </div>
    </div>

    <!-- 添加/编辑框 -->
    <div class="edit_box">
        <form class="layui-form" action="">
            <div class="layui-form-item">
                <label class="layui-form-label">标题</label>
                <div class="layui-input-block">
                    <input type="text" name="name" required lay-verify="required" placeholder="请输入标题" autocomplete="off"
                        class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">密钥</label>
                <div class="layui-input-inline" style="width: 200px;">
                    <input type="text" name="password" required lay-verify="required" placeholder="请输入密钥(Secret)"
                        autocomplete="off" class="layui-input">
                </div>
                <div class="layui-form-mid layui-word-aux">Base32编码的密钥</div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">周期(秒)</label>
                <div class="layui-input-block">
                    <input type="number" name="max" required lay-verify="required" placeholder="验证码更新周期"
                        autocomplete="off" class="layui-input" value="30">
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <input type="hidden" name="index">
                    <button class="layui-btn" lay-submit lay-filter="submit_btn">保存</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
    <!-- 添加/编辑框 -->

    <!-- 设置框 -->
    <div class="set_box">
        <form class="layui-form" action="" lay-filter="set_box">
            <div class="layui-form-item">
                <label class="layui-form-label">自动隐藏</label>
                <div class="layui-input-block">
                    <input type="checkbox" name="auto_close" lay-skin="switch" value="true" lay-text="ON|OFF">
                    <div class="layui-form-mid layui-word-aux">复制后自动隐藏主窗口</div>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">复制通知</label>
                <div class="layui-input-block">
                    <input type="checkbox" name="msg_close" lay-skin="switch" value="true" lay-text="ON|OFF">
                    <div class="layui-form-mid layui-word-aux">复制成功后系统通知</div>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <input type="hidden" name="index">
                    <button class="layui-btn" lay-submit lay-filter="submit_set_btn">保存</button>
                </div>
            </div>
        </form>
    </div>
    <!-- 设置框 -->

    <!-- 备份管理框 -->
    <div class="backup_box" style="display: none;">
        <div class="backup-actions" style="margin-bottom: 15px;">
            <button type="button" class="layui-btn layui-btn-sm" id="backupImportBtn">
                <i class="layui-icon">&#xe67c;</i>导入数据
            </button>
            <button type="button" class="layui-btn layui-btn-sm layui-btn-normal" id="backupExportBtn">
                <i class="layui-icon">&#xe67d;</i>导出当前数据
            </button>
            <span style="margin-left: 10px; color: #999; font-size: 12px;" id="backupCount">共 0 个备份</span>
        </div>
        <div class="backup-list" id="backupList">
            <!-- 动态生成备份列表 -->
        </div>
    </div>
    <!-- 备份管理框 -->

    <canvas id="qrcanvas" style="display:none;"></canvas>

    <!-- 模板 -->
    <script src="./layui/layui.js"></script>
    <script src="./js/otpauth.js"></script>
    <script src="./js/jsQR.js"></script>
    <script src="./js/app.js"></script>

    <!-- 渲染列表数据 -->
    <script id="item" type="text/html">
        <%#  if(d.length === 0){ %>
        <div style="padding: 15px;">
            <blockquote class="layui-elem-quote">
                <h3>📋 添加说明</h3>
                <p style="margin: 10px 0;">支持的二维码格式：</p>
                <pre class="layui-code" lay-skin="notepad" style="padding: 10px; background: #f8f8f8;">
otpauth://totp/账号名称?secret=XXXXXXXX&issuer=服务名</pre>
                <p style="margin-top: 10px; color: #666;">
                    <strong>快捷操作：</strong><br>
                    • 点击"识别二维码"扫描屏幕二维码<br>
                    • 点击"添加密钥"手动输入<br>
                    • 支持 Google Authenticator、Microsoft Authenticator 等导出的数据
                </p>
            </blockquote>
        </div>
        <%#  }else{ %>
            <%#  layui.each(d, function(index, item){ %>
                <div class="layui-card" data-index="<% index %>" tabindex="0">
                    <div class="layui-card-header">
                        <span class="card-index"><% index + 1 %></span>
                        <span class="card-name"><% item.name %></span>
                    </div>
                    <div class="layui-card-body">
                        <div class="layui-elem-quote" style="position: relative;">
                            <p class="num copy-btn" title="点击复制">000000</p>
                            <div class="card-info">
                                <span class="countdown-text" id="countdown<% index %>"><% item.max || 30 %>s</span>
                                <%# if(index < 9){ %>
                                <span class="shortcut-text">Alt+<% index + 1 %></span>
                                <%# } %>
                            </div>
                            <div class="layui-btn-group btns">
                                <button type="button" class="layui-btn layui-btn-sm layui-btn-danger del-btn" title="删除">
                                    <i class="layui-icon">&#xe640;</i>
                                </button>
                                <button type="button" class="layui-btn layui-btn-sm edit-btn" title="编辑">
                                    <i class="layui-icon">&#xe642;</i>
                                </button>
                                <button type="button" class="layui-btn layui-btn-sm layui-btn-normal copy-btn" title="复制">
                                    <i class="layui-icon">&#x1005;</i>
                                </button>
                            </div>
                        </div>
                        <div class="layui-progress layui-progress-big" lay-filter="loading<% index %>">
                            <div class="layui-progress-bar" data-id="<% index %>" data-max="<% item.max %>" lay-percent="100%"></div>
                        </div>
                    </div>
                </div>
            <%#  }); %>
        <%#  } %>
        <div style="height: 50px;"></div>
    </script>
</body>

</html>
